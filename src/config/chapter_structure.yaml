# New Book Structure for FirstDistinction 2.0

# Organized by conceptual flow, not historical accumulation

parts:
  part_1:
    title: "Genesis: The Unavoidable Structure"
    chapters:
      - number: 1
        title: "The Mark"
        content: "D₀ - the primordial distinction"
        agda_modules: ["D₀"]
        
      - number: 2
        title: "The Witness"
        content: "D₁ - observation as structure"
        agda_modules: ["D₁"]
        
      - number: 3
        title: "The Cut"
        content: "D₂ - here vs there, Bool emergence"
        agda_modules: ["D₂", "Bool"]
        
      - number: 4
        title: "Witness-Closure"
        content: "Why 6 edges are forced"
        agda_modules: ["WitnessClosure"]
        
      - number: 5
        title: "K₄ Emerges"
        content: "The unique solution to witness-closure"
        agda_modules: ["K4", "GraphTheory"]
        five_pillar: true
        
      - number: 6
        title: "The Distinction Field"
        content: "One field, one structure, all physics"
        agda_modules: ["DistinctionField"]

  part_2:
    title: "Arithmetic: Tools for Self-Reference"
    chapters:
      - number: 7
        title: "Natural Numbers"
        content: "ℕ from iterated distinction"
        agda_modules: ["ℕ", "Peano"]
        
      - number: 8
        title: "Integers"
        content: "ℤ as signed differences"
        agda_modules: ["ℤ"]
        
      - number: 9
        title: "Rationals"
        content: "ℚ as ratios"
        agda_modules: ["ℚ"]
        
      - number: 10
        title: "Reals and Continuity"
        content: "ℝ via Cauchy sequences"
        agda_modules: ["ℝ", "Interval"]

  part_3:
    title: "Spacetime: K₄ as Geometry"
    chapters:
      - number: 11
        title: "Embedding Dimension"
        content: "d = 3 is forced"
        agda_modules: ["EmbeddingDimension"]
        five_pillar: true
        
      - number: 12
        title: "Time Emergence"
        content: "Drift asymmetry creates temporal direction"
        agda_modules: ["TimeEmergence", "Drift"]
        
      - number: 13
        title: "Minkowski Signature"
        content: "(3+1) from K₄ structure"
        agda_modules: ["MinkowskiSignature"]
        
      - number: 14
        title: "The Einstein Tensor"
        content: "κ = 8 from 2(d+1)"
        agda_modules: ["EinsteinCoupling"]
        five_pillar: true
        
      - number: 15
        title: "Cosmological Constant"
        content: "Λ = 3 from boundary conditions"
        agda_modules: ["CosmologicalConstant"]

  part_4:
    title: "Forces: K₄ Symmetries"
    chapters:
      - number: 16
        title: "Gauge Structure"
        content: "SU(3) × SU(2) × U(1) from K₄ automorphisms"
        agda_modules: ["GaugeSymmetry", "S4"]
        five_pillar: true
        
      - number: 17
        title: "The Fine-Structure Constant"
        content: "α⁻¹ = 137 from spectral invariants"
        agda_modules: ["Alpha", "SpectralStructure"]
        five_pillar: true
        
      - number: 18
        title: "The Weinberg Angle"
        content: "sin²θ_W from edge/vertex ratio"
        agda_modules: ["WeinbergAngle"]
        five_pillar: true
        
      - number: 19
        title: "RG Flow"
        content: "Running couplings as K₄ scale aspects"
        agda_modules: ["RGFlow"]

  part_5:
    title: "Matter: K₄ Eigenmodes"
    chapters:
      - number: 20
        title: "The Laplacian Spectrum"
        content: "Eigenvalues {0, 4, 4, 4}"
        agda_modules: ["LaplacianSpectrum"]
        
      - number: 21
        title: "Fermion Generations"
        content: "Three generations from triple degeneracy"
        agda_modules: ["FermionGenerations"]
        five_pillar: true
        
      - number: 22
        title: "Electron Mass"
        content: "m_e as ground state"
        agda_modules: ["ElectronMass"]
        
      - number: 23
        title: "Muon Mass Ratio"
        content: "m_μ/m_e ≈ 207 from eigenvalue ratios"
        agda_modules: ["MuonMassRatio"]
        five_pillar: true
        
      - number: 24
        title: "Proton-Electron Ratio"
        content: "m_p/m_e ≈ 1836 from composite structure"
        agda_modules: ["ProtonElectronRatio"]
        five_pillar: true
        
      - number: 25
        title: "Quark Mixing"
        content: "CKM matrix from tetrahedral angles"
        agda_modules: ["CKMMatrix", "CabibboAngle"]

  part_6:
    title: "Cosmos: K₄ at Large Scale"
    chapters:
      - number: 26
        title: "Matter Density"
        content: "Ω_m = 0.31 from K₄ capacity"
        agda_modules: ["MatterDensity"]
        five_pillar: true
        
      - number: 27
        title: "Spectral Index"
        content: "n_s = 0.96 from primordial structure"
        agda_modules: ["SpectralIndex"]
        
      - number: 28
        title: "Hierarchy Problem"
        content: "M_Planck/m_e from recursive structure"
        agda_modules: ["HierarchyProblem"]

  part_7:
    title: "Validation: Experimental Contact"
    chapters:
      - number: 29
        title: "PDG Comparison"
        content: "All derived values vs measured"
        agda_modules: ["PDGValidation"]
        
      - number: 30
        title: "Precision Analysis"
        content: "Error bounds and confidence"
        agda_modules: ["PrecisionAnalysis"]
        
      - number: 31
        title: "Open Questions"
        content: "What remains to be understood"

  appendices:
    - title: "Glossary"
    - title: "Agda Module Index"
    - title: "Symbol Reference"
    - title: "Proof Index"
