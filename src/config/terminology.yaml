# Canonical Terminology for FirstDistinction 2.0

core_concepts:
  distinction:
    term: "distinction"
    agda: "Distinction"
    latex: "D_0"
    definition: "The fundamental ontological act: marking φ from ¬φ"
    first_defined: "Chapter 1"
    never_use: ["differentiation", "separation", "division"]
    
  witness:
    term: "witness"
    agda: "Witness"
    latex: "D_1"
    definition: "That which observes and verifies a distinction"
    first_defined: "Chapter 2"
    never_use: ["observer", "measurement device"]
    
  cut:
    term: "cut"
    agda: "D₂"
    latex: "D_2"
    definition: "The positional aspect of distinction: here vs there"
    first_defined: "Chapter 3"
    never_use: ["boundary", "separation"]
    
  k4:
    term: "K₄"
    latex: "K_4"
    agda: "K4"
    definition: "The complete graph on 4 vertices; the unique self-consistent structure forced by witness-closure"
    first_defined: "Chapter 5"
    never_use: ["tetrahedron graph", "4-clique", "complete-4"]

  witness_closure:
    term: "witness-closure"
    agda: "WitnessClosure"
    definition: "The requirement that every distinction must be witnessed, forming a closed system"
    first_defined: "Chapter 4"
    
  distinction_field:
    term: "Distinction Field"
    agda: "DistinctionField"
    definition: "The unique fundamental field; K₄ is its structure"
    first_defined: "Chapter 6"
    emphasis: "THE field (singular), not 'a field among many'"

k4_invariants:
  vertices:
    term: "V"
    value: 4
    meaning: "Number of vertices in K₄"
    
  edges:
    term: "E"
    value: 6
    meaning: "Number of edges in K₄"
    
  degree:
    term: "d"
    value: 3
    meaning: "Degree of each vertex"
    
  euler_characteristic:
    term: "χ"
    value: 2
    meaning: "Euler characteristic of tetrahedral embedding"
    
  embedding_dimension:
    term: "d_embed"
    value: 3
    meaning: "Minimal embedding dimension"
    
  kappa:
    term: "κ"
    value: 8
    meaning: "Einstein coupling 2(d+1)"

physics_terms:
  eigenmode:
    term: "eigenmode"
    definition: "An eigenvector of the K₄ Laplacian; physically manifests as a fermion generation"
    never_use: ["eigenstate", "eigensolution"]
    
  laplacian:
    term: "Laplacian"
    agda: "LaplacianMatrix"
    definition: "The graph Laplacian L = D - A, where D is degree matrix, A is adjacency"
    never_use: ["Laplace operator", "Laplace matrix"]

  fine_structure:
    term: "fine-structure constant"
    symbol: "α"
    agda: "alpha"
    definition: "The electromagnetic coupling; emerges as 1/137 from K₄ spectral structure"

proof_structure:
  forced:
    term: "forced"
    definition: "Logically necessary; no alternative exists"
    usage: "In 5-Pillar proofs, first pillar"
    never_use: ["required", "needed", "implied"]
    
  emergent:
    term: "emergent"
    definition: "Arising necessarily from K₄ structure without additional input"
    never_use: ["derived", "calculated", "predicted"]
